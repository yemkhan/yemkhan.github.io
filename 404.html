<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Page not found · Muzammil Khan</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <link rel="stylesheet" href="./assets/css/style.css" />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var dark = saved ? saved === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="error-page">
    <div>
      <h1>404</h1>
      <p>That page wandered off. Let's get you home.</p>
      <a href="./" class="btn btn--primary">
        Back to home
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</body>
</html>
